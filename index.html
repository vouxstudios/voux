<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voux Studios — Coming Soon</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-172648077-1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'UA-172648077-1');
  </script>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: #fff;
      text-align: center;
      background: #000;
    }

    /* Background Image */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('./backv.jpg') center center / cover no-repeat;
      z-index: -2;
      transform: scale(1.05);
    }

    /* Dark Overlay */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: -1;
    }

    .container {
      width: 90%;
      max-width: 700px;
      padding: 40px 20px;
    }

    .logo {
      margin-bottom: 30px;
    }

    .logo img {
      width: 100%;
      max-width: 320px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 10px 25px rgba(0,0,0,0.5));
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 20px;
      line-height: 1.2;
      font-weight: 700;
    }

    p {
      font-size: 1rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.88);
      margin-bottom: 35px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .socials a {
      width: 55px;
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      color: #fff;
      font-size: 1.3rem;
      text-decoration: none;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
    }

    .socials a:hover {
      background: #ffffff;
      color: #000;
      transform: translateY(-5px);
      border-color: #fff;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.65);
      padding: 0 20px;
    }

    @media (max-width: 768px) {
      .logo img {
        max-width: 240px;
      }

      p {
        font-size: 0.95rem;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px;
      }

      .logo img {
        max-width: 200px;
      }

      h1 {
        font-size: 2rem;
      }

      .socials a {
        width: 50px;
        height: 50px;
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Logo -->
    <div class="logo">
      <img src="./logo_splash.png" alt="Voux Studios Logo">
    </div>

    <h1>Coming Soon</h1>

    <p>
      We’re building something creative, modern, and unforgettable.
      Follow Voux Studios on social media and stay tuned for updates.
    </p>

    <!-- Social Links -->
    <div class="socials">

      <a href="https://facebook.com/vouxstudios" target="_blank" aria-label="Facebook">
        <i class="fab fa-facebook-f"></i>
      </a>

      <a href="https://instagram.com/vouxstudios" target="_blank" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>

      <a href="https://x.com/vouxstudios" target="_blank" aria-label="X / Twitter">
        <i class="fa-brands fa-x-twitter"></i>
      </a>

    </div>

  </div>

  <div class="footer">
    © 2026 Voux Studios. All rights reserved.
  </div>

</body>
</html>
